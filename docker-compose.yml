services:
  mates1:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: mates1:latest
    container_name: mates1
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
    volumes:
      # Persistencia del progreso entre redeploys.
      - mates1-data:/app/server/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/progress > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mates1-data:
    driver: local
